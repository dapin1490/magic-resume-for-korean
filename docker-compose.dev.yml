services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "pnpm dev --host 0.0.0.0 --port 3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  web_node_modules:
